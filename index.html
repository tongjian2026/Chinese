<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语文学堂 · 七年级</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --ink2: #4a3f35;
  --ink3: #8a7a6e;
  --paper: #faf8f4;
  --paper2: #f2ede4;
  --paper3: #e8e0d0;
  --red: #c0392b;
  --red-light: #fdf0ee;
  --green: #2d6a4f;
  --green-light: #eaf4ef;
  --gold: #b8860b;
  --gold-light: #fdf8e8;
  --blue: #1a4a6b;
  --blue-light: #eaf1f8;
  --border: rgba(26,20,16,0.12);
  --serif: 'Noto Serif SC', serif;
  --sans: 'Noto Sans SC', sans-serif;
  --radius: 8px;
  --shadow: 0 2px 12px rgba(26,20,16,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── HEADER ─── */
.header {
  background: var(--ink);
  color: var(--paper);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-brand {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.header-brand span { color: var(--gold); }
.header-nav { display: flex; gap: 4px; }
.nav-btn {
  background: none;
  border: none;
  color: rgba(250,248,244,0.6);
  font-family: var(--sans);
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.nav-btn:hover { color: var(--paper); background: rgba(255,255,255,0.08); }
.nav-btn.active { color: var(--paper); background: rgba(255,255,255,0.14); }

/* ─── API KEY BANNER ─── */
.api-banner {
  background: var(--gold-light);
  border-bottom: 1px solid rgba(184,134,11,0.2);
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--gold);
}
.api-banner input {
  flex: 1;
  max-width: 380px;
  padding: 6px 10px;
  border: 1px solid rgba(184,134,11,0.3);
  border-radius: 4px;
  font-size: 13px;
  background: white;
  color: var(--ink);
  font-family: monospace;
}
.api-banner input:focus { outline: none; border-color: var(--gold); }
.api-save-btn {
  padding: 6px 14px;
  background: var(--gold);
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--sans);
}
.api-saved { color: var(--green); font-size: 12px; display: none; }

/* ─── LAYOUT ─── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: 220px;
  background: var(--paper2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px 0;
}
.sidebar-section { padding: 0 12px 16px; }
.sidebar-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--ink3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 6px;
}
.article-item {
  padding: 7px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  color: var(--ink2);
  transition: all 0.12s;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}
.article-item:hover { background: var(--paper3); color: var(--ink); }
.article-item.active { background: var(--ink); color: var(--paper); }
.article-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--paper3);
}
.article-item.active .article-dot { background: var(--gold); }
.article-type {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: auto;
  flex-shrink: 0;
}
.type-prose { background: var(--blue-light); color: var(--blue); }
.type-poem { background: var(--gold-light); color: var(--gold); }
.type-classical { background: var(--red-light); color: var(--red); }

/* ─── MAIN ─── */
.main { flex: 1; display: flex; overflow: hidden; }

/* ─── READING PANEL ─── */
.reading-panel {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
}
.article-header { margin-bottom: 28px; }
.article-title {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}
.article-author {
  font-size: 14px;
  color: var(--ink3);
  font-family: var(--serif);
  margin-bottom: 14px;
}
.article-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--ink2);
}

.article-body {
  font-family: var(--serif);
  font-size: 17px;
  line-height: 2.2;
  color: var(--ink);
  max-width: 680px;
}
.article-body p { margin-bottom: 1.2em; }

w {
  background: linear-gradient(180deg, transparent 60%, rgba(184,134,11,0.25) 60%);
  cursor: pointer;
  border-radius: 2px;
  position: relative;
  padding: 0 1px;
  transition: background 0.15s;
}
w:hover { background: rgba(184,134,11,0.2); }
w.learned { background: linear-gradient(180deg, transparent 60%, rgba(45,106,79,0.3) 60%); }
w.learned:hover { background: rgba(45,106,79,0.2); }

.writing-tip {
  margin-top: 24px;
  padding: 16px 20px;
  background: var(--paper2);
  border-left: 3px solid var(--gold);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 14px;
  color: var(--ink2);
  line-height: 1.8;
  max-width: 680px;
}
.writing-tip strong { color: var(--ink); }

.section-divider {
  height: 1px;
  background: var(--border);
  max-width: 680px;
  margin: 28px 0;
}

/* ─── RIGHT PANEL ─── */
.right-panel {
  width: 320px;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--paper);
  flex-shrink: 0;
}
.right-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 4px;
}
.right-tab {
  flex: 1;
  padding: 12px 8px;
  font-size: 12px;
  color: var(--ink3);
  cursor: pointer;
  text-align: center;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  font-family: var(--sans);
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.right-tab:hover { color: var(--ink); }
.right-tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 500; }
.right-content { flex: 1; overflow-y: auto; padding: 16px; }

/* ─── WORD CARD ─── */
.word-card {
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.word-main { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--ink); }
.word-pinyin { font-size: 13px; color: var(--ink3); margin: 2px 0 10px; }
.word-def { font-size: 14px; color: var(--ink2); line-height: 1.7; margin-bottom: 12px; }
.word-contexts-title { font-size: 11px; font-weight: 500; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.word-context-item {
  padding: 10px 12px;
  background: var(--paper);
  border-radius: 6px;
  margin-bottom: 6px;
  border-left: 2px solid var(--gold);
}
.word-context-text { font-family: var(--serif); font-size: 14px; line-height: 1.8; color: var(--ink); }
.word-context-src { font-size: 11px; color: var(--ink3); margin-top: 4px; }
.word-ctx-hl { color: var(--red); font-weight: 700; }

.srs-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.srs-label { font-size: 11px; color: var(--ink3); }
.srs-bar-wrap { flex: 1; height: 3px; background: var(--paper3); border-radius: 2px; margin: 0 10px; overflow: hidden; }
.srs-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }
.mark-btn {
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  background: none;
  color: var(--ink2);
  font-family: var(--sans);
  transition: all 0.15s;
}
.mark-btn:hover { background: var(--green); color: white; border-color: var(--green); }
.mark-btn.marked { background: var(--green-light); color: var(--green); border-color: rgba(45,106,79,0.3); }

/* ─── PRACTICE TAB ─── */
.practice-task {
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
}
.task-label { font-size: 10px; font-weight: 500; color: var(--ink3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.task-text { font-size: 13px; color: var(--ink); line-height: 1.8; }
.required-words { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.req-word { font-size: 12px; padding: 2px 8px; border-radius: 20px; background: var(--ink); color: var(--paper); font-family: var(--serif); }
.req-word.used { background: var(--green); }

.write-area {
  width: 100%;
  min-height: 120px;
  padding: 12px;
  font-family: var(--serif);
  font-size: 15px;
  line-height: 2;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  resize: vertical;
  background: white;
  color: var(--ink);
  transition: border-color 0.15s;
  margin-bottom: 10px;
}
.write-area:focus { outline: none; border-color: var(--ink2); }

.submit-btn {
  width: 100%;
  padding: 10px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: 14px;
  cursor: pointer;
  transition: opacity 0.15s;
  margin-bottom: 10px;
}
.submit-btn:hover { opacity: 0.85; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.feedback {
  background: var(--green-light);
  border: 1px solid rgba(45,106,79,0.2);
  border-radius: var(--radius);
  padding: 14px;
  font-size: 13px;
  color: var(--ink);
  line-height: 1.8;
  display: none;
}
.feedback.visible { display: block; }
.feedback.error { background: var(--red-light); border-color: rgba(192,57,43,0.2); }
.feedback-head { font-weight: 500; font-size: 13px; margin-bottom: 6px; }
.loading-dots::after {
  content: '';
  animation: dots 1.2s infinite;
}
@keyframes dots {
  0%,20% { content: ''; }
  40% { content: '·'; }
  60% { content: '··'; }
  80%,100% { content: '···'; }
}

/* ─── REVIEW TAB ─── */
.review-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-box { background: var(--paper2); border-radius: var(--radius); padding: 10px; text-align: center; border: 1px solid var(--border); }
.stat-n { font-size: 22px; font-weight: 700; font-family: var(--serif); color: var(--ink); }
.stat-l { font-size: 10px; color: var(--ink3); margin-top: 2px; }
.review-card-wrap { perspective: 600px; }
.review-flip {
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  margin-bottom: 14px;
}
.review-char { font-family: var(--serif); font-size: 52px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
.review-ctx {
  font-family: var(--serif);
  font-size: 13px;
  color: var(--ink3);
  line-height: 1.8;
  padding: 10px;
  background: var(--paper);
  border-radius: 6px;
  margin-bottom: 14px;
}
.review-answer { display: none; }
.review-answer.visible { display: block; }
.review-def { font-size: 14px; color: var(--ink2); line-height: 1.7; margin: 12px 0 16px; }
.review-btns { display: flex; gap: 8px; }
.review-btn {
  flex: 1;
  padding: 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  transition: all 0.15s;
}
.review-btn.hard:hover { background: var(--red-light); border-color: rgba(192,57,43,0.3); color: var(--red); }
.review-btn.ok:hover { background: var(--gold-light); border-color: rgba(184,134,11,0.3); color: var(--gold); }
.review-btn.easy:hover { background: var(--green-light); border-color: rgba(45,106,79,0.3); color: var(--green); }
.show-answer-btn {
  width: 100%;
  padding: 10px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--serif);
  font-size: 14px;
  cursor: pointer;
  color: var(--ink2);
  transition: all 0.15s;
  margin-bottom: 14px;
}
.show-answer-btn:hover { background: var(--paper2); }

.no-review { text-align: center; padding: 40px 20px; color: var(--ink3); font-size: 14px; }

/* ─── EMPTY STATE ─── */
.empty-word { text-align: center; padding: 40px 20px; color: var(--ink3); }
.empty-word-char { font-family: var(--serif); font-size: 48px; color: var(--paper3); margin-bottom: 12px; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--paper3); border-radius: 10px; }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,20,16,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  display: none;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--paper);
  border-radius: 12px;
  padding: 28px 32px;
  max-width: 440px;
  width: 90%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}
.modal h2 { font-family: var(--serif); font-size: 20px; margin-bottom: 10px; }
.modal p { font-size: 14px; color: var(--ink2); line-height: 1.7; margin-bottom: 16px; }
.modal input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: monospace;
  margin-bottom: 14px;
}
.modal input:focus { outline: none; border-color: var(--ink); }
.modal-btn {
  width: 100%;
  padding: 11px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  cursor: pointer;
  font-family: var(--sans);
}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">语文<span>学堂</span> · 七年级</div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="switchMode('read')">📖 精读</button>
    <button class="nav-btn" onclick="switchMode('vocab')">📝 词库</button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">七年级上册</div>
      <div id="sidebar-list-s1"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">七年级下册</div>
      <div id="sidebar-list-s2"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- READING -->
    <div class="reading-panel" id="reading-panel">
      <div id="article-display"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="right-tabs">
        <button class="right-tab active" onclick="switchTab('word')">词汇</button>
        <button class="right-tab" onclick="switchTab('practice')">仿写</button>
        <button class="right-tab" onclick="switchTab('review')">复习</button>
      </div>
      <div class="right-content" id="right-content">
        <div class="empty-word">
          <div class="empty-word-char">词</div>
          <div>点击文中<br>高亮词汇查看详解</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const ARTICLES = [
  // 七年级上册
  {
    id: 'chun', semester: 1, title: '春', author: '朱自清',
    tags: ['散文', '写景抒情', '拟人·比喻', '总分结构'],
    type: 'prose',
    tip: '本文运用"总—分—总"结构：开篇总写春天来临，中间分写春草、春花、春风、春雨、迎春五幅图，结尾总收升华。大量运用<strong>拟人</strong>（"小草偷偷地从土里钻出来"）和<strong>比喻</strong>（"春天像刚落地的娃娃"），语言节奏明快，叠词运用娴熟。',
    paragraphs: [
      '盼望着，盼望着，东风来了，春天的脚步近了。',
      '一切都像刚睡醒的样子，<w id="xxy">欣欣然</w>张开了眼。山<w id="lr">朗润</w>起来了，水涨起来了，太阳的脸红起来了。',
      '小草<w id="ttd">偷偷地</w>从土里钻出来，嫩嫩的，绿绿的。园子里，田野里，瞧去，一大片一大片满是的。坐着，躺着，打两个滚，踢几脚球，赛几趟跑，捉几回迷藏。风轻悄悄的，草软绵绵的。',
      '桃树、杏树、梨树，你不让我，我不让你，都开满了花<w id="ganzhao">赶趟儿</w>。红的像火，粉的像霞，白的像雪。花里带着甜味儿；闭了眼，树上仿佛已经满是桃儿、杏儿、梨儿。花下成千成百的蜜蜂嗡嗡地闹着，大小的蝴蝶飞来飞去。',
      '"吹面不寒杨柳风"，不错的，像母亲的手抚摸着你。风里带来些新翻的泥土的气息，混着青草味儿，还有各种花的香，都在微微润湿的空气里<w id="niangjuan">酝酿</w>。',
    ],
    words: {
      xxy: { word: '欣欣然', pinyin: 'xīn xīn rán', def: '形容欢欢喜喜、生意盎然的样子。副词，修饰"张开了眼"，赋予自然以人的喜悦之情。', contexts: [
        { text: '一切都像刚睡醒的样子，<b>欣欣然</b>张开了眼。', src: '《春》朱自清 · 七上' },
        { text: '孩子们<b>欣欣然</b>跑出教室，操场上顿时喧闹起来。', src: '课外散文 · 描写童年' },
        { text: '见到久别的朋友，他<b>欣欣然</b>迎上前去。', src: '叙事文练习语料' },
      ]},
      lr: { word: '朗润', pinyin: 'lǎng rùn', def: '明亮润泽。"朗"指明亮，"润"指滋润。写春雨过后山色明亮而滋润的样子，视觉描写。', contexts: [
        { text: '山<b>朗润</b>起来了，水涨起来了，太阳的脸红起来了。', src: '《春》朱自清 · 七上' },
        { text: '雨后，远山<b>朗润</b>，像是刚洗过脸的孩子。', src: '仿写练习语料' },
        { text: '天色<b>朗润</b>而高远，秋风将最后一片云吹散。', src: '《秋天的记忆》课外阅读' },
      ]},
      ttd: { word: '偷偷地', pinyin: 'tōu tōu de', def: '悄悄地，不被察觉地。拟人用法，将春草萌发写得轻柔而充满生命力，仿佛草在"捉迷藏"。', contexts: [

// SRS DATA (localStorage simulation via JS object)
let srsData = JSON.parse(localStorage.getItem('srs_data') || '{}');
let learnedWords = JSON.parse(localStorage.getItem('learned_words') || '{}');

function saveSRS() {
  localStorage.setItem('srs_data', JSON.stringify(srsData));
  localStorage.setItem('learned_words', JSON.stringify(learnedWords));
}

function getNextReview(wordKey) {
  const d = srsData[wordKey];
  if (!d) return null;
  return new Date(d.nextReview);
}

function recordReview(wordKey, ease) {
  // ease: 1=hard,2=ok,3=easy
  const now = Date.now();
  const d = srsData[wordKey] || { interval: 1, ease: 2.5, reviews: 0 };
  d.reviews++;
  if (ease === 1) { d.interval = 1; d.ease = Math.max(1.3, d.ease - 0.2); }
  else if (ease === 2) { d.interval = Math.round(d.interval * d.ease); }
  else { d.interval = Math.round(d.interval * d.ease * 1.3); d.ease = Math.min(3, d.ease + 0.1); }
  d.nextReview = now + d.interval * 86400000;
  d.lastReview = now;
  srsData[wordKey] = d;
  saveSRS();
}

function markLearned(wordKey) {
  learnedWords[wordKey] = Date.now();
  if (!srsData[wordKey]) {
    srsData[wordKey] = { interval: 1, ease: 2.5, reviews: 0, nextReview: Date.now() + 86400000 };
  }
  saveSRS();
}

function getSRSProgress(wordKey) {
  const d = srsData[wordKey];
  if (!d) return 0;
  const maxInterval = 30;
  return Math.min(100, Math.round((d.interval / maxInterval) * 100));
}

function getDueWords() {
  const now = Date.now();
  return Object.keys(srsData).filter(k => srsData[k].nextReview <= now);
}

function init() {
  buildSidebar();

function buildSidebar() {
  const s1 = document.getElementById('sidebar-list-s1');
  const s2 = document.getElementById('sidebar-list-s2');
  ARTICLES.forEach(a => {
    const el = document.createElement('div');
    el.className = 'article-item' + (a.id === currentArticle.id ? ' active' : '');
    el.id = 'nav-' + a.id;
    const typeLabel = a.type === 'poem' ? '诗' : a.type === 'classical' ? '古文' : '散文';
    const typeClass = a.type === 'poem' ? 'type-poem' : a.type === 'classical' ? 'type-classical' : 'type-prose';
    el.innerHTML = `<span class="article-dot"></span>${a.title}<span class="article-type ${typeClass}">${typeLabel}</span>`;
    el.onclick = () => loadArticle(a);
    (a.semester === 1 ? s1 : s2).appendChild(el);
  });
}

  currentArticle = article;

  document.querySelectorAll('.article-item').forEach(el => el.classList.remove('active'));

    <div class="article-header">
      <div class="article-title">${article.title}</div>
      <div class="article-author">${article.author}</div>
      <div class="article-tags">${tagsHtml}</div>
    </div>
    <div class="article-body">${bodyHtml}</div>
    <div class="section-divider"></div>

  `;

    const wid = el.id;
    if (article.words[wid]) {
      if (learnedWords[currentArticle.id + '_' + wid]) el.classList.add('learned');
      el.onclick = () => showWord(wid);
    }
  });

  switchTab('word');
  showWordDefault();
}

function showWordDefault() {
  document.getElementById('right-content').innerHTML = `
    <div class="empty-word">
      <div class="empty-word-char">词</div>
      <div style="font-size:14px;color:var(--ink3);">点击文中<br>高亮词汇<br>查看详解与语境</div>
    </div>
  `;
}

function showWord(wid) {
  const wordData = currentArticle.words[wid];
  if (!wordData) return;
  currentWord = wid;
  const wordKey = currentArticle.id + '_' + wid;
  const isLearned = !!learnedWords[wordKey];
  const progress = getSRSProgress(wordKey);
  const nextReview = getNextReview(wordKey);
  const srsLabel = nextReview ? `下次复习：${formatDate(nextReview)}` : '尚未加入复习';

  const contextsHtml = wordData.contexts.map(c => `
    <div class="word-context-item">
      <div class="word-context-text">${c.text}</div>
      <div class="word-context-src">${c.src}</div>
    </div>
  `).join('');

  const barColor = progress > 66 ? '#2d6a4f' : progress > 33 ? '#b8860b' : '#c0392b';

  document.getElementById('right-content').innerHTML = `
    <div class="word-card">
      <div class="word-main">${wordData.word}</div>
      <div class="word-pinyin">${wordData.pinyin}</div>
      <div class="word-def">${wordData.def}</div>
      <div class="word-contexts-title">在不同语境中的使用</div>
      ${contextsHtml}
      <div class="srs-info">
        <div class="srs-label">${srsLabel}</div>
        <div class="srs-bar-wrap"><div class="srs-bar" style="width:${progress}%;background:${barColor}"></div></div>
        <button class="mark-btn ${isLearned ? 'marked' : ''}" onclick="toggleLearned('${wordKey}','${wid}')" id="mark-btn-${wordKey}">
          ${isLearned ? '✓ 已掌握' : '加入复习'}
        </button>
      </div>
    </div>
    <button class="submit-btn" style="margin-top:8px;" onclick="switchTab('practice')">去仿写练习 →</button>
  `;
}

function toggleLearned(wordKey, wid) {
  if (learnedWords[wordKey]) {
    delete learnedWords[wordKey];
    delete srsData[wordKey];
    document.getElementById('mark-btn-' + wordKey).textContent = '加入复习';
    document.getElementById('mark-btn-' + wordKey).classList.remove('marked');
    document.querySelectorAll('.w').forEach(el => { if (el.id === wid) el.classList.remove('learned'); });
  } else {
    markLearned(wordKey);
    document.getElementById('mark-btn-' + wordKey).innerHTML = '✓ 已掌握';
    document.getElementById('mark-btn-' + wordKey).classList.add('marked');
    document.querySelectorAll('.w').forEach(el => { if (el.id === wid) el.classList.add('learned'); });
  }
  saveSRS();
}

function formatDate(d) {
  const now = new Date();
  const diff = Math.round((d - now) / 86400000);
  if (diff <= 0) return '今天';
  if (diff === 1) return '明天';
  if (diff < 7) return diff + ' 天后';
  return Math.round(diff / 7) + ' 周后';
}

// ─── TABS ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.right-tab').forEach((el, i) => {
    el.classList.toggle('active', ['word','practice','review'][i] === tab);
  });
  if (tab === 'word') {
    if (currentWord) showWord(currentWord);
    else showWordDefault();
  } else if (tab === 'practice') {
    showPractice();
  } else {
    showReview();
  }
}

// ─── PRACTICE ───────────────────────────────────────────────────────────────
function showPractice() {
  const p = currentArticle.practice;
  const wordsHtml = p.words.map(w => `<span class="req-word" id="rw-${w}">${w}</span>`).join('');
  document.getElementById('right-content').innerHTML = `
    <div class="practice-task">
      <div class="task-label">仿写任务 · ${currentArticle.title}</div>
      <div class="task-text">${p.prompt}</div>
      <div class="required-words">${wordsHtml}</div>
    </div>
    <textarea class="write-area" id="write-area" placeholder="在此写下你的仿写…" oninput="checkWords(this.value)"></textarea>
    <button class="submit-btn" id="submit-btn" onclick="submitWriting()">检查仿写</button>
    <div class="feedback" id="feedback"></div>
    <div style="margin-top:12px;">
      <button class="submit-btn" style="background:transparent;color:var(--ink3);border:1px solid var(--border);font-size:12px;" onclick="showModelAnswer()">查看范文参考</button>
    </div>
    <div class="feedback" id="model-answer-box" style="background:var(--gold-light);border-color:rgba(184,134,11,0.2);display:none;"></div>
  `;
}

function checkWords(text) {
  const p = currentArticle.practice;
  p.words.forEach(w => {
    const baseW = w.replace(/（.*）/, '').replace(/\(.*\)/, '');
    const el = document.getElementById('rw-' + w);
    if (el) el.classList.toggle('used', text.includes(baseW));
  });
}

function showModelAnswer() {
  const box = document.getElementById('model-answer-box');
  box.style.display = 'block';
  box.innerHTML = `<div class="feedback-head">范文参考</div>${currentArticle.practice.model_answer}`;
}

function submitWriting() {
  const text = document.getElementById('write-area').value.trim();
  const fb = document.getElementById('feedback');
  const btn = document.getElementById('submit-btn');

  if (!text) {
    fb.className = 'feedback error visible';
    fb.innerHTML = '<div class="feedback-head">请先写下你的仿写内容。</div>';
    return;
  }

  const p = currentArticle.practice;
  const charCount = text.length;

  // 1. 词汇检查
  const baseWords = p.words.map(w => w.replace(/（.*）/, '').replace(/\(.*\)/, ''));
  const used = baseWords.filter(w => text.includes(w));
  const missed = baseWords.filter(w => !text.includes(w));

  let lines = [];

  // 词汇反馈
  if (missed.length === 0) {
    lines.push('✅ <b>词汇使用</b>：所有要求词汇都用上了，很棒！');
  } else if (used.length > 0) {
    lines.push(`📝 <b>词汇使用</b>：已用到「${used.join('、')}」，还差「${missed.join('、')}」，试着加入句子中。`);
  } else {
    lines.push(`📝 <b>词汇使用</b>：请尝试在仿写中使用「${missed.join('、')}」。`);
  }

  // 2. 篇幅反馈
  if (charCount < 40) {
    lines.push('📏 <b>篇幅</b>：内容较短，可以再展开——加入更多感官细节（看到什么？听到什么？感受到什么？）');
  } else if (charCount >= 40 && charCount < 80) {
    lines.push('📏 <b>篇幅</b>：篇幅适中，如果能再增加一些细节描写会更丰富。');
  } else {
    lines.push('📏 <b>篇幅</b>：篇幅充足，内容丰富！');
  }

  // 3. 手法提示（根据课文类型）
  const genre = currentArticle.practice.genre || '';
  if (genre.includes('拟人')) {
    const renyiPatterns = ['的', '地', '着', '了', '起来', '出来', '走', '跑', '笑', '哭', '说', '唱', '跳'];
    const hasAction = renyiPatterns.some(p => text.includes(p));
    if (hasAction) {
      lines.push('✨ <b>写作手法</b>：句子中有动作或状态描写，留意其中有没有让自然物"做"人才做的事——这就是拟人。');
    } else {
      lines.push('💡 <b>写作手法</b>：仿写要求运用拟人手法，试试让花、草、风、雨做一个人才会做的动作或表达情感。');
    }
  } else if (genre.includes('比喻')) {
    const hasSimile = text.includes('像') || text.includes('仿佛') || text.includes('如') || text.includes('似');
    lines.push(hasSimile
      ? '✨ <b>写作手法</b>：检测到比喻词（像/仿佛/如），记得本体和喻体要有相似点，比喻才生动。'
      : '💡 <b>写作手法</b>：本次要求运用比喻，可以用"像""仿佛""如"等词，把描写的事物比作另一种相似的事物。');
  } else if (genre.includes('意象')) {
    lines.push('💡 <b>写作手法</b>：意象叠加时，注意所选意象的情感色调要统一（都偏喜悦、或都偏忧愁），最后一句点明情感。');
  } else {
    lines.push('💡 <b>写作手法</b>：仔细对照范文，看看自己的句式结构是否与仿写要求相符。');
  }

  // 4. 叠词检查（对写景文）
  const hasRepeat = /(.)\1/.test(text);
  if ((genre.includes('写景') || currentArticle.id === 'chun') && hasRepeat) {
    lines.push('🎵 <b>语言亮点</b>：使用了叠词，读起来更有节奏感，继续保持！');
  }

  // 5. 综合评价
  const score = (used.length === baseWords.length ? 3 : used.length > 0 ? 2 : 1)
              + (charCount >= 60 ? 2 : charCount >= 40 ? 1 : 0)
              + (hasRepeat ? 1 : 0);
  const level = score >= 5 ? '优秀 ⭐⭐⭐' : score >= 3 ? '良好 ⭐⭐' : '继续努力 ⭐';
  lines.push(`<br>🏅 <b>综合评价</b>：${level}　继续加油，写作需要多读多练，你做得很好！`);

  fb.className = 'feedback visible';
  fb.innerHTML = '<div class="feedback-head">检查反馈</div>' + lines.join('<br>');
  btn.disabled = false;
}

// ─── REVIEW ─────────────────────────────────────────────────────────────────
let reviewQueue = [];
let reviewIndex = 0;
let reviewRevealed = false;

function showReview() {
  const due = getDueWords();
  const total = Object.keys(learnedWords).length;

  // stats
  const streakKey = 'streak';
  const lastStudy = localStorage.getItem('last_study_date');
  const today = new Date().toDateString();
  let streak = parseInt(localStorage.getItem('streak_count') || '0');
  if (lastStudy !== today) {
    if (lastStudy === new Date(Date.now() - 86400000).toDateString()) streak++;
    else streak = 1;
    localStorage.setItem('last_study_date', today);
    localStorage.setItem('streak_count', streak);
  }

  const statsHtml = `
    <div class="review-stats">
      <div class="stat-box"><div class="stat-n">${total}</div><div class="stat-l">已加入词汇</div></div>
      <div class="stat-box"><div class="stat-n" style="color:${due.length>0?'#c0392b':'#2d6a4f'}">${due.length}</div><div class="stat-l">今日待复习</div></div>
      <div class="stat-box"><div class="stat-n" style="color:#b8860b">${streak}</div><div class="stat-l">连续学习天</div></div>
    </div>
  `;

  if (due.length === 0) {
    document.getElementById('right-content').innerHTML = statsHtml + `
      <div class="no-review">
        <div style="font-size:36px;margin-bottom:12px;">✓</div>
        <div>今日复习已完成！</div>
        <div style="margin-top:8px;font-size:13px;">继续阅读文章，<br>点击词汇加入复习库</div>
      </div>
    `;
    return;
  }

  // build review queue with word data
  reviewQueue = due.map(key => {
    const [articleId, wid] = key.split('_');
    const article = ARTICLES.find(a => a.id === articleId);
    if (!article) return null;
    const wordData = article.words[wid];
    if (!wordData) return null;
    // find a context sentence
    const ctx = wordData.contexts[0];
    return { key, word: wordData.word, pinyin: wordData.pinyin, def: wordData.def, context: ctx, articleTitle: article.title };
  }).filter(Boolean);

  reviewIndex = 0;
  renderReviewCard(statsHtml);
}

function renderReviewCard(statsHtml) {
  const content = document.getElementById('right-content');
  if (reviewIndex >= reviewQueue.length) {
    content.innerHTML = (statsHtml || '') + `<div class="no-review"><div style="font-size:36px;margin-bottom:12px;">🎉</div><div>本批复习完成！</div></div>`;
    return;
  }
  const item = reviewQueue[reviewIndex];
  content.innerHTML = (statsHtml || '') + `
    <div class="review-flip">
      <div style="font-size:11px;color:var(--ink3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;">来自《${item.articleTitle}》</div>
      <div class="review-char">${item.word}</div>
      <div class="review-ctx">${item.context ? item.context.text : ''}</div>
      <button class="show-answer-btn" onclick="revealAnswer()">显示释义</button>
      <div class="review-answer" id="review-answer">
        <div style="font-size:12px;color:var(--ink3);margin-bottom:4px;">${item.pinyin}</div>
        <div class="review-def">${item.def}</div>
        <div style="font-size:11px;color:var(--ink3);margin-bottom:10px;">记住了吗？</div>
        <div class="review-btns">
          <button class="review-btn hard" onclick="rateReview(1)">困难<br><span style="font-size:10px;font-weight:400">明天再看</span></button>
          <button class="review-btn ok" onclick="rateReview(2)">还好<br><span style="font-size:10px;font-weight:400">${Math.round((srsData[item.key]?.interval||1)*2.5)} 天后</span></button>
          <button class="review-btn easy" onclick="rateReview(3)">轻松<br><span style="font-size:10px;font-weight:400">${Math.round((srsData[item.key]?.interval||1)*3.25)} 天后</span></button>
        </div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--ink3);text-align:center;">第 ${reviewIndex+1} / ${reviewQueue.length} 个</div>
  `;
}

function revealAnswer() {
  document.getElementById('review-answer').classList.add('visible');
  document.querySelector('.show-answer-btn').style.display = 'none';
}

function rateReview(ease) {
  const item = reviewQueue[reviewIndex];
  recordReview(item.key, ease);
  reviewIndex++;
  renderReviewCard();
}


function switchMode(mode) {
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', ['read','vocab'][i]===mode));
}

// ─── START ───────────────────────────────────────────────────────────────────
init();
</script>
