<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语文学堂 · 七年级</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --ink2: #4a3f35;
  --ink3: #8a7a6e;
  --paper: #faf8f4;
  --paper2: #f2ede4;
  --paper3: #e8e0d0;
  --red: #c0392b;
  --red-light: #fdf0ee;
  --green: #2d6a4f;
  --green-light: #eaf4ef;
  --gold: #b8860b;
  --gold-light: #fdf8e8;
  --blue: #1a4a6b;
  --blue-light: #eaf1f8;
  --border: rgba(26,20,16,0.12);
  --serif: 'Noto Serif SC', serif;
  --sans: 'Noto Sans SC', sans-serif;
  --radius: 8px;
  --shadow: 0 2px 12px rgba(26,20,16,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── HEADER ─── */
.header {
  background: var(--ink);
  color: var(--paper);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-brand {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.header-brand span { color: var(--gold); }
.header-nav { display: flex; gap: 4px; }
.nav-btn {
  background: none;
  border: none;
  color: rgba(250,248,244,0.6);
  font-family: var(--sans);
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.grade-tabs { display: flex; gap: 4px; padding: 10px 10px 6px; }
.grade-tab {
  flex: 1; padding: 5px 4px; border-radius: 5px; border: 1px solid var(--border);
  background: var(--paper); color: var(--ink3); font-size: 11px; cursor: pointer;
  font-family: var(--sans); transition: all 0.15s;
}
.grade-tab:hover { color: var(--ink); background: var(--paper3); }
.grade-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 500; }
.nav-btn:hover { color: var(--paper); background: rgba(255,255,255,0.08); }
.nav-btn.active { color: var(--paper); background: rgba(255,255,255,0.14); }

/* ─── API KEY BANNER ─── */
.api-banner {
  background: var(--gold-light);
  border-bottom: 1px solid rgba(184,134,11,0.2);
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--gold);
}
.api-banner input {
  flex: 1;
  max-width: 380px;
  padding: 6px 10px;
  border: 1px solid rgba(184,134,11,0.3);
  border-radius: 4px;
  font-size: 13px;
  background: white;
  color: var(--ink);
  font-family: monospace;
}
.api-banner input:focus { outline: none; border-color: var(--gold); }
.api-save-btn {
  padding: 6px 14px;
  background: var(--gold);
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--sans);
}
.api-saved { color: var(--green); font-size: 12px; display: none; }

/* ─── LAYOUT ─── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: 220px;
  background: var(--paper2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px 0;
}
.sidebar-section { padding: 0 12px 16px; }
.sidebar-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--ink3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 6px;
}
.article-item {
  padding: 7px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  color: var(--ink2);
  transition: all 0.12s;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}
.article-item:hover { background: var(--paper3); color: var(--ink); }
.article-item.active { background: var(--ink); color: var(--paper); }
.article-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--paper3);
}
.article-item.active .article-dot { background: var(--gold); }
.article-type {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: auto;
  flex-shrink: 0;
}
.type-prose { background: var(--blue-light); color: var(--blue); }
.type-poem { background: var(--gold-light); color: var(--gold); }
.type-classical { background: var(--red-light); color: var(--red); }

/* ─── MAIN ─── */
.main { flex: 1; display: flex; overflow: hidden; }

/* ─── READING PANEL ─── */
.reading-panel {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
}
.article-header { margin-bottom: 28px; }
.article-title {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}
.article-author {
  font-size: 14px;
  color: var(--ink3);
  font-family: var(--serif);
  margin-bottom: 14px;
}
.article-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--ink2);
}

.article-body {
  font-family: var(--serif);
  font-size: 17px;
  line-height: 2.2;
  color: var(--ink);
  max-width: 680px;
}
.article-body p { margin-bottom: 1.2em; }

w {
  background: linear-gradient(180deg, transparent 60%, rgba(184,134,11,0.25) 60%);
  cursor: pointer;
  border-radius: 2px;
  position: relative;
  padding: 0 1px;
  transition: background 0.15s;
}
w:hover { background: rgba(184,134,11,0.2); }
w.learned { background: linear-gradient(180deg, transparent 60%, rgba(45,106,79,0.3) 60%); }
w.learned:hover { background: rgba(45,106,79,0.2); }

.writing-tip {
  margin-top: 24px;
  padding: 16px 20px;
  background: var(--paper2);
  border-left: 3px solid var(--gold);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 14px;
  color: var(--ink2);
  line-height: 1.8;
  max-width: 680px;
}
.writing-tip strong { color: var(--ink); }

.section-divider {
  height: 1px;
  background: var(--border);
  max-width: 680px;
  margin: 28px 0;
}

/* ─── RIGHT PANEL ─── */
.right-panel {
  width: 320px;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--paper);
  flex-shrink: 0;
}
.right-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 4px;
}
.right-tab {
  flex: 1;
  padding: 12px 8px;
  font-size: 12px;
  color: var(--ink3);
  cursor: pointer;
  text-align: center;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  font-family: var(--sans);
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.right-tab:hover { color: var(--ink); }
.right-tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 500; }
.right-content { flex: 1; overflow-y: auto; padding: 16px; }

/* ─── WORD CARD ─── */
.word-card {
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.word-main { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--ink); }
.word-pinyin { font-size: 13px; color: var(--ink3); margin: 2px 0 10px; }
.word-def { font-size: 14px; color: var(--ink2); line-height: 1.7; margin-bottom: 12px; }
.word-contexts-title { font-size: 11px; font-weight: 500; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.word-context-item {
  padding: 10px 12px;
  background: var(--paper);
  border-radius: 6px;
  margin-bottom: 6px;
  border-left: 2px solid var(--gold);
}
.word-context-text { font-family: var(--serif); font-size: 14px; line-height: 1.8; color: var(--ink); }
.word-context-src { font-size: 11px; color: var(--ink3); margin-top: 4px; }
.word-ctx-hl { color: var(--red); font-weight: 700; }

.srs-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.srs-label { font-size: 11px; color: var(--ink3); }
.srs-bar-wrap { flex: 1; height: 3px; background: var(--paper3); border-radius: 2px; margin: 0 10px; overflow: hidden; }
.srs-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }
.mark-btn {
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  background: none;
  color: var(--ink2);
  font-family: var(--sans);
  transition: all 0.15s;
}
.mark-btn:hover { background: var(--green); color: white; border-color: var(--green); }
.mark-btn.marked { background: var(--green-light); color: var(--green); border-color: rgba(45,106,79,0.3); }

/* ─── PRACTICE TAB ─── */
.practice-task {
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
}
.task-label { font-size: 10px; font-weight: 500; color: var(--ink3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.task-text { font-size: 13px; color: var(--ink); line-height: 1.8; }
.required-words { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.req-word { font-size: 12px; padding: 2px 8px; border-radius: 20px; background: var(--ink); color: var(--paper); font-family: var(--serif); }
.req-word.used { background: var(--green); }

.write-area {
  width: 100%;
  min-height: 120px;
  padding: 12px;
  font-family: var(--serif);
  font-size: 15px;
  line-height: 2;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  resize: vertical;
  background: white;
  color: var(--ink);
  transition: border-color 0.15s;
  margin-bottom: 10px;
}
.write-area:focus { outline: none; border-color: var(--ink2); }

.submit-btn {
  width: 100%;
  padding: 10px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: 14px;
  cursor: pointer;
  transition: opacity 0.15s;
  margin-bottom: 10px;
}
.submit-btn:hover { opacity: 0.85; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.feedback {
  background: var(--green-light);
  border: 1px solid rgba(45,106,79,0.2);
  border-radius: var(--radius);
  padding: 14px;
  font-size: 13px;
  color: var(--ink);
  line-height: 1.8;
  display: none;
}
.feedback.visible { display: block; }
.feedback.error { background: var(--red-light); border-color: rgba(192,57,43,0.2); }
.feedback-head { font-weight: 500; font-size: 13px; margin-bottom: 6px; }
.loading-dots::after {
  content: '';
  animation: dots 1.2s infinite;
}
@keyframes dots {
  0%,20% { content: ''; }
  40% { content: '·'; }
  60% { content: '··'; }
  80%,100% { content: '···'; }
}

/* ─── REVIEW TAB ─── */
.review-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-box { background: var(--paper2); border-radius: var(--radius); padding: 10px; text-align: center; border: 1px solid var(--border); }
.stat-n { font-size: 22px; font-weight: 700; font-family: var(--serif); color: var(--ink); }
.stat-l { font-size: 10px; color: var(--ink3); margin-top: 2px; }
.review-card-wrap { perspective: 600px; }
.review-flip {
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  margin-bottom: 14px;
}
.review-char { font-family: var(--serif); font-size: 52px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
.review-ctx {
  font-family: var(--serif);
  font-size: 13px;
  color: var(--ink3);
  line-height: 1.8;
  padding: 10px;
  background: var(--paper);
  border-radius: 6px;
  margin-bottom: 14px;
}
.review-answer { display: none; }
.review-answer.visible { display: block; }
.review-def { font-size: 14px; color: var(--ink2); line-height: 1.7; margin: 12px 0 16px; }
.review-btns { display: flex; gap: 8px; }
.review-btn {
  flex: 1;
  padding: 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  transition: all 0.15s;
}
.review-btn.hard:hover { background: var(--red-light); border-color: rgba(192,57,43,0.3); color: var(--red); }
.review-btn.ok:hover { background: var(--gold-light); border-color: rgba(184,134,11,0.3); color: var(--gold); }
.review-btn.easy:hover { background: var(--green-light); border-color: rgba(45,106,79,0.3); color: var(--green); }
.show-answer-btn {
  width: 100%;
  padding: 10px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--serif);
  font-size: 14px;
  cursor: pointer;
  color: var(--ink2);
  transition: all 0.15s;
  margin-bottom: 14px;
}
.show-answer-btn:hover { background: var(--paper2); }

.no-review { text-align: center; padding: 40px 20px; color: var(--ink3); font-size: 14px; }

/* ─── UPGRADE CHALLENGE ─── */
.upgrade-section {
  margin-top: 18px;
  padding: 14px 16px;
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  border-left: 3px solid var(--gold);
}
.upgrade-label { font-size: 11px; font-weight: 500; letter-spacing: .08em; color: var(--gold); margin-bottom: 6px; }
.upgrade-desc { font-size: 13px; color: var(--ink2); line-height: 1.6; margin-bottom: 8px; }
.upgrade-original {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink3);
  padding: 8px 12px;
  background: var(--paper);
  border-radius: 4px;
  border: 1px dashed var(--border);
}

/* ─── PLAN ─── */
.plan-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
.plan-stat { background: var(--paper2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; text-align: center; }
.plan-stat-n { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--ink); }
.plan-stat-l { font-size: 10px; color: var(--ink3); margin-top: 2px; }

.plan-week { display: flex; gap: 4px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
.plan-day {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 6px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--paper2);
  min-width: 52px; font-size: 11px; color: var(--ink3);
  gap: 3px;
}
.plan-day.today { border-color: var(--gold); background: var(--gold-light); color: var(--ink); }
.plan-day.past { opacity: 0.5; }
.plan-day-num { font-size: 10px; }
.plan-day-icon { font-size: 18px; }
.plan-day-title { font-size: 10px; text-align: center; line-height: 1.3; }

.plan-today {
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.plan-today-head {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 8px;
}
.plan-done-badge {
  font-size: 11px; padding: 2px 8px;
  background: var(--green-light); color: var(--green);
  border: 1px solid rgba(45,106,79,0.2); border-radius: 20px;
}
.plan-today-desc { font-size: 13px; color: var(--ink2); line-height: 1.7; margin-bottom: 10px; }
.plan-today-task {
  font-size: 13px; color: var(--ink);
  background: var(--paper); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px;
}
.plan-task-label { font-size: 10px; letter-spacing: .08em; color: var(--ink3); margin-bottom: 4px; }

.plan-section-title { font-size: 11px; letter-spacing: .1em; color: var(--ink3); margin: 14px 0 8px; text-transform: uppercase; }

.activity-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--ink2);
  padding: 6px 0; border-bottom: 1px solid var(--paper3);
}
.activity-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
.activity-item span:nth-child(2) { flex: 1; }
.activity-chars { color: var(--ink3); font-size: 11px; }
.activity-date { color: var(--ink3); font-size: 11px; white-space: nowrap; }

/* ─── EMPTY STATE ─── */
.empty-word { text-align: center; padding: 40px 20px; color: var(--ink3); }
.empty-word-char { font-family: var(--serif); font-size: 48px; color: var(--paper3); margin-bottom: 12px; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--paper3); border-radius: 10px; }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,20,16,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  display: none;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--paper);
  border-radius: 12px;
  padding: 28px 32px;
  max-width: 440px;
  width: 90%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}
.modal h2 { font-family: var(--serif); font-size: 20px; margin-bottom: 10px; }
.modal p { font-size: 14px; color: var(--ink2); line-height: 1.7; margin-bottom: 16px; }
.modal input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: monospace;
  margin-bottom: 14px;
}
.modal input:focus { outline: none; border-color: var(--ink); }
.modal-btn {
  width: 100%;
  padding: 11px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  cursor: pointer;
  font-family: var(--sans);
}

/* ─── WEEKLY PLAN ─── */
.plan-header {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink2);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.plan-progress-ring {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--ink3);
}
.plan-day {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 8px;
  transition: box-shadow 0.15s;
}
.plan-day:hover { box-shadow: var(--shadow); }
.plan-day-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  background: var(--paper2);
  user-select: none;
}
.plan-day-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500;
  background: var(--paper3);
  color: var(--ink3);
  flex-shrink: 0;
}
.plan-day.today .plan-day-num { background: var(--gold); color: white; }
.plan-day.done .plan-day-num { background: var(--green); color: white; }
.plan-day-title { font-size: 13px; font-weight: 500; flex: 1; }
.plan-day.today .plan-day-title { color: var(--gold); }
.plan-day.done .plan-day-title { color: var(--green); }
.plan-day-badge {
  font-size: 10px; padding: 2px 7px;
  border-radius: 10px; font-weight: 500;
}
.badge-today { background: var(--gold-light); color: var(--gold); }
.badge-done { background: var(--green-light); color: var(--green); }
.badge-lock { background: var(--paper3); color: var(--ink3); }
.plan-day-body {
  padding: 12px 14px;
  display: none;
  border-top: 1px solid var(--border);
  background: white;
}
.plan-day-body.open { display: block; }
.plan-task {
  display: flex; gap: 8px; align-items: flex-start;

// SRS DATA (localStorage simulation via JS object)
let srsData = JSON.parse(localStorage.getItem('srs_data') || '{}');
let learnedWords = JSON.parse(localStorage.getItem('learned_words') || '{}');

function saveSRS() {
  localStorage.setItem('srs_data', JSON.stringify(srsData));
  localStorage.setItem('learned_words', JSON.stringify(learnedWords));
}

function getNextReview(wordKey) {
  const d = srsData[wordKey];
  if (!d) return null;
  return new Date(d.nextReview);
}

function recordReview(wordKey, ease) {
  // ease: 1=hard,2=ok,3=easy
  const now = Date.now();
  const d = srsData[wordKey] || { interval: 1, ease: 2.5, reviews: 0 };
  d.reviews++;
  if (ease === 1) { d.interval = 1; d.ease = Math.max(1.3, d.ease - 0.2); }
  else if (ease === 2) { d.interval = Math.round(d.interval * d.ease); }
  else { d.interval = Math.round(d.interval * d.ease * 1.3); d.ease = Math.min(3, d.ease + 0.1); }
  d.nextReview = now + d.interval * 86400000;
  d.lastReview = now;
  srsData[wordKey] = d;
  saveSRS();
}

function markLearned(wordKey) {
  learnedWords[wordKey] = Date.now();
  if (!srsData[wordKey]) {
    srsData[wordKey] = { interval: 1, ease: 2.5, reviews: 0, nextReview: Date.now() + 86400000 };
  }
  saveSRS();
  recordActivity('read', currentArticle.id);
}

function getSRSProgress(wordKey) {
  const d = srsData[wordKey];
  if (!d) return 0;
  const maxInterval = 30;
  return Math.min(100, Math.round((d.interval / maxInterval) * 100));
}

function getDueWords() {
  const now = Date.now();
  return Object.keys(srsData).filter(k => srsData[k].nextReview <= now);
}

// ─── STATE ──────────────────────────────────────────────────────────────────
let currentArticle = ARTICLES[0];
let currentWord = null;
let activeTab = 'word';

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  buildSidebar();
  loadArticle(ARTICLES[0]);
}

function switchGrade(g) {
  [6,7,8].forEach(n => {
    document.getElementById('sidebar-grade-' + n).style.display = n === g ? 'block' : 'none';
  });
  document.querySelectorAll('.grade-tab').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.grade) === g);
  });
}

function buildSidebar() {
  ARTICLES.forEach(a => {
    const el = document.createElement('div');
    el.className = 'article-item';
    el.id = 'nav-' + a.id;
    const typeLabel = a.type === 'poem' ? '诗' : a.type === 'classical' ? '古文' : '散文';
    const typeClass = a.type === 'poem' ? 'type-poem' : a.type === 'classical' ? 'type-classical' : 'type-prose';
    el.innerHTML = `<span class="article-dot"></span>${a.title}<span class="article-type ${typeClass}">${typeLabel}</span>`;
    el.onclick = () => loadArticle(a);

    // Route to correct list by semester value
    let targetId = null;
    const s = String(a.semester);
    if (s === '1' || s === 's1') targetId = 'sidebar-list-s1';
    else if (s === '2' || s === 's2') targetId = 'sidebar-list-s2';
    else if (s === '6a') targetId = 'sidebar-list-6a';
    else if (s === '6b') targetId = 'sidebar-list-6b';
    else if (s === '8a') targetId = 'sidebar-list-8a';
    else if (s === '8b') targetId = 'sidebar-list-8b';

    if (targetId) {
      const container = document.getElementById(targetId);
      if (container) container.appendChild(el);
    }
  });

  // Mark first article active
  const firstNav = document.getElementById('nav-' + ARTICLES[0].id);
  if (firstNav) firstNav.classList.add('active');
}

function loadArticle(article) {
  currentArticle = article;
  currentWord = null;

  // Auto-switch to correct grade tab
  const s = String(article.semester);
  const grade = s.startsWith('6') ? 6 : s.startsWith('8') ? 8 : 7;
  switchGrade(grade);

  document.querySelectorAll('.article-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + article.id);
  if (navEl) navEl.classList.add('active');

  const tagsHtml = article.tags.map(t => `<span class="tag">${t}</span>`).join('');
  let bodyHtml = article.paragraphs.map(p => `<p>${p}</p>`).join('');

  document.getElementById('article-display').innerHTML = `
    <div class="article-header">
      <div class="article-title">${article.title}</div>
      <div class="article-author">${article.author}</div>
      <div class="article-tags">${tagsHtml}</div>
    </div>
    <div class="article-body">${bodyHtml}</div>
    <div class="section-divider"></div>
    <div class="writing-tip"><strong>写作手法：</strong>${article.tip}</div>
  `;

  // attach word click
  document.querySelectorAll('w').forEach(el => {
    const wid = el.id;
    if (article.words[wid]) {
      if (learnedWords[currentArticle.id + '_' + wid]) el.classList.add('learned');
      el.onclick = () => showWord(wid);
    }
  });

  switchTab('word');
  showWordDefault();
}

function showWordDefault() {
  document.getElementById('right-content').innerHTML = `
    <div class="empty-word">
      <div class="empty-word-char">词</div>
      <div style="font-size:14px;color:var(--ink3);">点击文中<br>高亮词汇<br>查看详解与语境</div>
    </div>
  `;
}

function showWord(wid) {
  const wordData = currentArticle.words[wid];
  if (!wordData) return;
  currentWord = wid;
  const wordKey = currentArticle.id + '_' + wid;
  const isLearned = !!learnedWords[wordKey];
  const progress = getSRSProgress(wordKey);
  const nextReview = getNextReview(wordKey);
  const srsLabel = nextReview ? `下次复习：${formatDate(nextReview)}` : '尚未加入复习';

  const contextsHtml = wordData.contexts.map(c => `
    <div class="word-context-item">
      <div class="word-context-text">${c.text}</div>
      <div class="word-context-src">${c.src}</div>
    </div>
  `).join('');

  const barColor = progress > 66 ? '#2d6a4f' : progress > 33 ? '#b8860b' : '#c0392b';

  document.getElementById('right-content').innerHTML = `
    <div class="word-card">
      <div class="word-main">${wordData.word}</div>
      <div class="word-pinyin">${wordData.pinyin}</div>
      <div class="word-def">${wordData.def}</div>
      <div class="word-contexts-title">在不同语境中的使用</div>
      ${contextsHtml}
      <div class="srs-info">
        <div class="srs-label">${srsLabel}</div>
        <div class="srs-bar-wrap"><div class="srs-bar" style="width:${progress}%;background:${barColor}"></div></div>
        <button class="mark-btn ${isLearned ? 'marked' : ''}" onclick="toggleLearned('${wordKey}','${wid}')" id="mark-btn-${wordKey}">
          ${isLearned ? '✓ 已掌握' : '加入复习'}
        </button>
      </div>
    </div>
    <button class="submit-btn" style="margin-top:8px;" onclick="switchTab('practice')">去仿写练习 →</button>
  `;
}

function toggleLearned(wordKey, wid) {
  if (learnedWords[wordKey]) {
    delete learnedWords[wordKey];
    delete srsData[wordKey];
    document.getElementById('mark-btn-' + wordKey).textContent = '加入复习';
    document.getElementById('mark-btn-' + wordKey).classList.remove('marked');
    document.querySelectorAll('.w').forEach(el => { if (el.id === wid) el.classList.remove('learned'); });
  } else {
    markLearned(wordKey);
    document.getElementById('mark-btn-' + wordKey).innerHTML = '✓ 已掌握';
    document.getElementById('mark-btn-' + wordKey).classList.add('marked');
    document.querySelectorAll('.w').forEach(el => { if (el.id === wid) el.classList.add('learned'); });
  }
  saveSRS();
}

function formatDate(d) {
  const now = new Date();
  const diff = Math.round((d - now) / 86400000);
  if (diff <= 0) return '今天';
  if (diff === 1) return '明天';
  if (diff < 7) return diff + ' 天后';
  return Math.round(diff / 7) + ' 周后';
}

// ─── TABS ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.right-tab').forEach((el, i) => {
    el.classList.toggle('active', ['word','practice','review','plan','stats'][i] === tab);
  });
  if (tab === 'word') {
    if (currentWord) showWord(currentWord);
    else showWordDefault();
  } else if (tab === 'practice') {
    showPractice();
  } else if (tab === 'review') {
    showReview();
  } else if (tab === 'plan') {
    showPlan();
  } else if (tab === 'stats') {
    showStats();
  }
}

function checkUpgrade() {
  const text = document.getElementById('upgrade-area').value.trim();
  const fb = document.getElementById('upgrade-feedback');
  const upgradeWord = currentArticle.upgradeWord || currentArticle.practice.words[0];
  if (!text) { fb.className = 'feedback error visible'; fb.innerHTML = '请先写下你的改写句子。'; return; }
  const used = text.includes(upgradeWord);
  const longer = text.length > (document.getElementById('upgrade-original').textContent.length);
  let msg = '';
  if (used && longer) {
    msg = `✅ 很好！用上了「${upgradeWord}」，句子也更丰富了。这就是"表达升级"——同一件事，用不同的词说出更有画面感的效果。`;
  } else if (used) {
    msg = `📝 用上了「${upgradeWord}」，不错！试试看能不能再加一点细节，让读者更有画面感？`;
  } else {
    msg = `💡 试着把「${upgradeWord}」加进句子里——比如：把"摇动"换成"仿佛在低声交谈"，效果会完全不一样。`;
  }
  fb.className = 'feedback visible';
  fb.innerHTML = msg;
  // record upgrade attempt
  recordActivity('upgrade', currentArticle.id);
}

function checkWords(text) {
  const p = currentArticle.practice;
  p.words.forEach(w => {
    const baseW = w.replace(/（.*）/, '').replace(/\(.*\)/, '');
    const el = document.getElementById('rw-' + w);
    if (el) el.classList.toggle('used', text.includes(baseW));
  });
}

function showModelAnswer() {
  const box = document.getElementById('model-answer-box');
  box.style.display = 'block';
  box.innerHTML = `<div class="feedback-head">范文参考</div>${currentArticle.practice.model_answer}`;
}

function submitWriting() {
  const text = document.getElementById('write-area').value.trim();
  const fb = document.getElementById('feedback');
  const btn = document.getElementById('submit-btn');

  if (!text) {
    fb.className = 'feedback error visible';
    fb.innerHTML = '<div class="feedback-head">请先写下你的仿写内容。</div>';
    return;
  }

  const p = currentArticle.practice;
  const charCount = text.length;

  // 1. 词汇检查
  const baseWords = p.words.map(w => w.replace(/（.*）/, '').replace(/\(.*\)/, ''));
  const used = baseWords.filter(w => text.includes(w));
  const missed = baseWords.filter(w => !text.includes(w));

  let lines = [];

  // 词汇反馈
  if (missed.length === 0) {
    lines.push('✅ <b>词汇使用</b>：所有要求词汇都用上了，很棒！');
  } else if (used.length > 0) {
    lines.push(`📝 <b>词汇使用</b>：已用到「${used.join('、')}」，还差「${missed.join('、')}」，试着加入句子中。`);
  } else {
    lines.push(`📝 <b>词汇使用</b>：请尝试在仿写中使用「${missed.join('、')}」。`);
  }

  // 2. 篇幅反馈
  if (charCount < 40) {
    lines.push('📏 <b>篇幅</b>：内容较短，可以再展开——加入更多感官细节（看到什么？听到什么？感受到什么？）');
  } else if (charCount >= 40 && charCount < 80) {
    lines.push('📏 <b>篇幅</b>：篇幅适中，如果能再增加一些细节描写会更丰富。');
  } else {
    lines.push('📏 <b>篇幅</b>：篇幅充足，内容丰富！');
  }

  // 3. 手法提示（根据课文类型）
  const genre = currentArticle.practice.genre || '';
  if (genre.includes('拟人')) {
    const renyiPatterns = ['的', '地', '着', '了', '起来', '出来', '走', '跑', '笑', '哭', '说', '唱', '跳'];
    const hasAction = renyiPatterns.some(p => text.includes(p));
    if (hasAction) {
      lines.push('✨ <b>写作手法</b>：句子中有动作或状态描写，留意其中有没有让自然物"做"人才做的事——这就是拟人。');
    } else {
      lines.push('💡 <b>写作手法</b>：仿写要求运用拟人手法，试试让花、草、风、雨做一个人才会做的动作或表达情感。');
    }
  } else if (genre.includes('比喻')) {
    const hasSimile = text.includes('像') || text.includes('仿佛') || text.includes('如') || text.includes('似');
    lines.push(hasSimile
      ? '✨ <b>写作手法</b>：检测到比喻词（像/仿佛/如），记得本体和喻体要有相似点，比喻才生动。'
      : '💡 <b>写作手法</b>：本次要求运用比喻，可以用"像""仿佛""如"等词，把描写的事物比作另一种相似的事物。');
  } else if (genre.includes('意象')) {
    lines.push('💡 <b>写作手法</b>：意象叠加时，注意所选意象的情感色调要统一（都偏喜悦、或都偏忧愁），最后一句点明情感。');
  } else {
    lines.push('💡 <b>写作手法</b>：仔细对照范文，看看自己的句式结构是否与仿写要求相符。');
  }

  // 4. 叠词检查（对写景文）
  const hasRepeat = /(.)\1/.test(text);
  if ((genre.includes('写景') || currentArticle.id === 'chun') && hasRepeat) {
    lines.push('🎵 <b>语言亮点</b>：使用了叠词，读起来更有节奏感，继续保持！');
  }

  // 5. 综合评价
  const score = (used.length === baseWords.length ? 3 : used.length > 0 ? 2 : 1)
              + (charCount >= 60 ? 2 : charCount >= 40 ? 1 : 0)
              + (hasRepeat ? 1 : 0);
  const level = score >= 5 ? '优秀 ⭐⭐⭐' : score >= 3 ? '良好 ⭐⭐' : '继续努力 ⭐';
  lines.push(`<br>🏅 <b>综合评价</b>：${level}　继续加油，写作需要多读多练，你做得很好！`);

  fb.className = 'feedback visible';
  fb.innerHTML = '<div class="feedback-head">检查反馈</div>' + lines.join('<br>');
  btn.disabled = false;
  // record writing activity
  recordActivity('write', currentArticle.id, text.length);
}

// ─── REVIEW ─────────────────────────────────────────────────────────────────
let reviewQueue = [];
let reviewIndex = 0;
let reviewRevealed = false;

function showReview() {
  const due = getDueWords();
  const total = Object.keys(learnedWords).length;

  // stats
  const streakKey = 'streak';
  const lastStudy = localStorage.getItem('last_study_date');
  const today = new Date().toDateString();
  let streak = parseInt(localStorage.getItem('streak_count') || '0');
  if (lastStudy !== today) {
    if (lastStudy === new Date(Date.now() - 86400000).toDateString()) streak++;
    else streak = 1;
    localStorage.setItem('last_study_date', today);
    localStorage.setItem('streak_count', streak);
  }

  const statsHtml = `
    <div class="review-stats">
      <div class="stat-box"><div class="stat-n">${total}</div><div class="stat-l">已加入词汇</div></div>
      <div class="stat-box"><div class="stat-n" style="color:${due.length>0?'#c0392b':'#2d6a4f'}">${due.length}</div><div class="stat-l">今日待复习</div></div>
      <div class="stat-box"><div class="stat-n" style="color:#b8860b">${streak}</div><div class="stat-l">连续学习天</div></div>
    </div>
  `;

  if (due.length === 0) {
    document.getElementById('right-content').innerHTML = statsHtml + `
      <div class="no-review">
        <div style="font-size:36px;margin-bottom:12px;">✓</div>
        <div>今日复习已完成！</div>
        <div style="margin-top:8px;font-size:13px;">继续阅读文章，<br>点击词汇加入复习库</div>
      </div>
    `;
    return;
  }

  // build review queue with word data
  reviewQueue = due.map(key => {
    const [articleId, wid] = key.split('_');
    const article = ARTICLES.find(a => a.id === articleId);
    if (!article) return null;
    const wordData = article.words[wid];
    if (!wordData) return null;
    // find a context sentence
    const ctx = wordData.contexts[0];
    return { key, word: wordData.word, pinyin: wordData.pinyin, def: wordData.def, context: ctx, articleTitle: article.title };
  }).filter(Boolean);

  reviewIndex = 0;
  renderReviewCard(statsHtml);
}

function renderReviewCard(statsHtml) {
  const content = document.getElementById('right-content');
  if (reviewIndex >= reviewQueue.length) {
    content.innerHTML = (statsHtml || '') + `<div class="no-review"><div style="font-size:36px;margin-bottom:12px;">🎉</div><div>本批复习完成！</div></div>`;
    return;
  }
  const item = reviewQueue[reviewIndex];
  content.innerHTML = (statsHtml || '') + `
    <div class="review-flip">
      <div style="font-size:11px;color:var(--ink3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;">来自《${item.articleTitle}》</div>
      <div class="review-char">${item.word}</div>
      <div class="review-ctx">${item.context ? item.context.text : ''}</div>
      <button class="show-answer-btn" onclick="revealAnswer()">显示释义</button>
      <div class="review-answer" id="review-answer">
        <div style="font-size:12px;color:var(--ink3);margin-bottom:4px;">${item.pinyin}</div>
        <div class="review-def">${item.def}</div>
        <div style="font-size:11px;color:var(--ink3);margin-bottom:10px;">记住了吗？</div>
        <div class="review-btns">
          <button class="review-btn hard" onclick="rateReview(1)">困难<br><span style="font-size:10px;font-weight:400">明天再看</span></button>
          <button class="review-btn ok" onclick="rateReview(2)">还好<br><span style="font-size:10px;font-weight:400">${Math.round((srsData[item.key]?.interval||1)*2.5)} 天后</span></button>
          <button class="review-btn easy" onclick="rateReview(3)">轻松<br><span style="font-size:10px;font-weight:400">${Math.round((srsData[item.key]?.interval||1)*3.25)} 天后</span></button>
        </div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--ink3);text-align:center;">第 ${reviewIndex+1} / ${reviewQueue.length} 个</div>
  `;
}

function revealAnswer() {
  document.getElementById('review-answer').classList.add('visible');
  document.querySelector('.show-answer-btn').style.display = 'none';
}

function rateReview(ease) {
  const item = reviewQueue[reviewIndex];
  recordReview(item.key, ease);
  reviewIndex++;
  renderReviewCard();
}


// ─── ACTIVITY LOG ────────────────────────────────────────────────────────────
function recordActivity(type, articleId, chars) {
  const log = JSON.parse(localStorage.getItem('activity_log') || '[]');
  log.push({ type, articleId, chars: chars || 0, date: new Date().toDateString(), ts: Date.now() });
  // keep last 200 entries
  if (log.length > 200) log.splice(0, log.length - 200);
  localStorage.setItem('activity_log', JSON.stringify(log));
}

function getActivityLog() {
  return JSON.parse(localStorage.getItem('activity_log') || '[]');
}

// ─── WEEKLY PLAN ─────────────────────────────────────────────────────────────
function showPlan() {
  const log = getActivityLog();
  const today = new Date().toDateString();
  const todayLog = log.filter(e => e.date === today);

  // figure out what day in the week cycle we're on (based on first activity or day 1)
  const firstDate = log.length ? new Date(log[0].ts) : new Date();
  const daysSinceStart = Math.floor((Date.now() - firstDate.getTime()) / 86400000);
  const weekDay = (daysSinceStart % 7) + 1; // 1-7

  const PLAN = [
    { day: 1, icon: '📖', title: '输入日', desc: '选一篇课文，完整阅读全文。找出：描写了什么？用了哪些感官（视觉/听觉/触觉）？哪句在表达感受？', task: '阅读课文，至少点击 3 个高亮词汇查看释义', taskType: 'read' },
    { day: 2, icon: '🔤', title: '词汇日', desc: '回到昨天读的课文，把你觉得好用的词加入词库。重点：这个词在其他文章里是怎么用的？', task: '加入至少 5 个词进词库，各看一遍语境', taskType: 'vocab' },
    { day: 3, icon: '🏗️', title: '结构日', desc: '拆解段落结构：这段是"描写→感受"还是"总→分→总"？用铅笔在纸上画出段落的骨架。', task: '选一篇课文，在纸上画出段落结构图', taskType: 'read' },
    { day: 4, icon: '✍️', title: '仿写日', desc: '核心任务！对照课文的结构和句式，写一段自己的文字（80-120字）。先写完，再检查词汇有没有用上。', task: '完成仿写并提交检查', taskType: 'write' },
    { day: 5, icon: '⬆️', title: '升级日', desc: '变式训练：把一个普通句子改写成更生动的版本。比如加"仿佛"、加感官细节、加情感句。', task: '完成仿写页的"升级挑战"', taskType: 'upgrade' },
    { day: 6, icon: '🏁', title: '整合日', desc: '本周成果：写一段完整描写（80-120字），要求：用到本周学的至少2个词，包含1个感官描写，结尾有感受句。', task: '完成本周最终仿写，字数≥80字', taskType: 'write' },
    { day: 7, icon: '🔄', title: '复习日', desc: '间隔复习：把本周加入词库的词全部过一遍，按"困难/还好/轻松"评分，让系统安排下次复习时间。', task: '完成今日所有待复习词汇', taskType: 'review' },
  ];

  // check today's completion
  const doneToday = {
    read: todayLog.some(e => e.type === 'read'),
    write: todayLog.some(e => e.type === 'write'),
    upgrade: todayLog.some(e => e.type === 'upgrade'),
    vocab: Object.keys(learnedWords).length > 0,
    review: todayLog.some(e => e.type === 'review'),
  };

  // streak
  const streak = parseInt(localStorage.getItem('streak_count') || '0');

  // total words learned
  const totalWords = Object.keys(learnedWords).length;
  // total writings
  const totalWrites = log.filter(e => e.type === 'write').length;
  // total chars written
  const totalChars = log.filter(e => e.type === 'write').reduce((s, e) => s + (e.chars || 0), 0);

  const planItem = PLAN[weekDay - 1];
  const isDone = doneToday[planItem.taskType];

  const allDaysHtml = PLAN.map(p => {
    const isToday = p.day === weekDay;
    const isPast = p.day < weekDay;
    const hadActivity = log.some(e => {
      const d = Math.floor((Date.now() - new Date(log[0]?.ts || Date.now()).getTime()) / 86400000);
      return e.type === p.taskType && Math.floor((Date.now() - e.ts) / 86400000) === (weekDay - p.day);
    });
    return `<div class="plan-day ${isToday ? 'today' : ''} ${isPast ? 'past' : ''}">
      <span class="plan-day-num">Day ${p.day}</span>
      <span class="plan-day-icon">${p.icon}</span>
      <span class="plan-day-title">${p.title}</span>
    </div>`;
  }).join('');

  document.getElementById('right-content').innerHTML = `
    <div class="plan-stats">
      <div class="plan-stat"><div class="plan-stat-n" style="color:var(--gold)">${streak}</div><div class="plan-stat-l">连续天</div></div>
      <div class="plan-stat"><div class="plan-stat-n">${totalWords}</div><div class="plan-stat-l">词汇量</div></div>
      <div class="plan-stat"><div class="plan-stat-n">${totalWrites}</div><div class="plan-stat-l">仿写次数</div></div>
      <div class="plan-stat"><div class="plan-stat-n">${totalChars}</div><div class="plan-stat-l">累计写字</div></div>
    </div>

    <div class="plan-week">${allDaysHtml}</div>

    <div class="plan-today">
      <div class="plan-today-head">
        <span>${planItem.icon} 今天 · Day ${weekDay} · ${planItem.title}</span>
        ${isDone ? '<span class="plan-done-badge">✓ 已完成</span>' : ''}
      </div>
      <div class="plan-today-desc">${planItem.desc}</div>
      <div class="plan-today-task">
        <div class="plan-task-label">今日任务</div>
        ${planItem.task}
      </div>
      <button class="submit-btn" style="margin-top:12px;font-size:12px;" onclick="switchTab('${
        planItem.taskType === 'read' ? 'word' :
        planItem.taskType === 'vocab' ? 'review' :
        planItem.taskType === 'write' || planItem.taskType === 'upgrade' ? 'practice' : 'review'
      }')">去完成任务 →</button>
    </div>

    <div class="plan-section-title">本周写作记录</div>
    ${log.filter(e => e.type === 'write').length === 0
      ? '<div style="font-size:13px;color:var(--ink3);padding:8px 0;">还没有写作记录，去仿写页完成第一次练习吧！</div>'
      : log.filter(e => e.type === 'write').slice(-5).reverse().map(e => `
        <div class="activity-item">
          <span class="activity-dot"></span>
          <span>完成仿写《${ARTICLES.find(a=>a.id===e.articleId)?.title||e.articleId}》</span>
          <span class="activity-chars">${e.chars} 字</span>
          <span class="activity-date">${e.date}</span>
        </div>`).join('')
    }
  `;
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function showStats() {
  const log = getActivityLog();
  const totalWords = Object.keys(learnedWords).length;
  const writes = log.filter(e => e.type === 'write');
  const totalWrites = writes.length;
  const totalChars = writes.reduce((s, e) => s + (e.chars || 0), 0);
  const totalUpgrades = log.filter(e => e.type === 'upgrade').length;
  const streak = parseInt(localStorage.getItem('streak_count') || '0');

  // words by article
  const wordsByArticle = {};
  Object.keys(learnedWords).forEach(key => {
    const [aid] = key.split('_');
    wordsByArticle[aid] = (wordsByArticle[aid] || 0) + 1;
  });

  const articleRows = Object.entries(wordsByArticle).map(([aid, cnt]) => {
    const a = ARTICLES.find(x => x.id === aid);
    return `<div class="log-item">
      <div class="log-item-title">《${a ? a.title : aid}》</div>
      <div class="log-item-meta">已学 ${cnt} 个词汇</div>
    </div>`;
  }).join('') || '<div class="empty-log">还没有加入词汇，阅读课文后点击高亮词汇开始吧</div>';

  // recent writings
  const recentWrites = writes.slice(-6).reverse().map(e => {
    const a = ARTICLES.find(x => x.id === e.articleId);
    return `<div class="log-item">
      <div class="log-item-title">仿写《${a ? a.title : e.articleId}》</div>
      <div class="log-item-meta">${e.date} · ${e.chars} 字</div>
    </div>`;
  }).join('') || '<div class="empty-log">还没有仿写记录，去仿写页完成第一次练习吧！</div>';

  // heatmap: last 28 days
  const dayMap = {};
  log.forEach(e => { dayMap[e.date] = (dayMap[e.date] || 0) + 1; });
  const heatCells = Array.from({length: 28}, (_, i) => {
    const d = new Date(Date.now() - (27 - i) * 86400000).toDateString();
    const cnt = dayMap[d] || 0;
    const bg = cnt === 0 ? 'var(--paper3)' : cnt < 3 ? '#a8d5b5' : cnt < 6 ? '#52b788' : '#1b7a4a';
    return `<div style="width:14px;height:14px;border-radius:3px;background:${bg};title='${d}:${cnt}次'"></div>`;
  }).join('');

  document.getElementById('right-content').innerHTML = `
    <div class="stats-panel">
      <div class="stats-title">学习总览</div>
      <div class="stats-grid">
        <div class="stats-card"><div class="stats-num" style="color:var(--gold)">${streak}</div><div class="stats-lbl">连续学习天</div></div>
        <div class="stats-card"><div class="stats-num">${totalWords}</div><div class="stats-lbl">词汇总量</div></div>
        <div class="stats-card"><div class="stats-num" style="color:var(--green)">${totalWrites}</div><div class="stats-lbl">仿写次数</div></div>
        <div class="stats-card"><div class="stats-num">${totalChars}</div><div class="stats-lbl">累计写字数</div></div>
      </div>

      <div class="stats-title" style="margin-top:4px;">最近 28 天活动</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:16px;">${heatCells}</div>
      <div style="font-size:11px;color:var(--ink3);margin-bottom:16px;">每格代表一天，颜色越深表示学习次数越多</div>

      <div class="stats-title">词汇进度（按课文）</div>
      <div class="writing-log">${articleRows}</div>

      <div class="stats-title" style="margin-top:12px;">最近仿写记录</div>
      <div class="writing-log">${recentWrites}</div>

      ${totalUpgrades > 0 ? `<div style="margin-top:12px;padding:10px 12px;background:var(--gold-light);border-radius:var(--radius);font-size:13px;color:var(--gold);">⬆ 已完成 ${totalUpgrades} 次升级挑战！</div>` : ''}
    </div>
  `;
}


function switchMode(mode) {
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', ['read','vocab'][i]===mode));
}
